<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-image: url('https://id-preview--2494f03c-daa0-49cb-8e91-45af13faf720.lovable.app/__l5e/assets-v1/228137e4-1b43-4257-a6be-20cc844e0666/kapusany.jpg');
      background-size: cover;
      background-position: center;
    }

    .card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      padding: 40px;
      width: 100%;
      max-width: 768px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      max-width: 220px;
      border-radius: 16px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      flex-shrink: 0;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #db2777;
    }

    p {
      font-size: 20px;
      margin-bottom: 32px;
      color: #1f2937;
    }

    .btn-area {
      position: relative;
      height: 64px;
      width: 100%;
    }

    button {
      position: absolute;
      padding: 12px 32px;
      border-radius: 9999px;
      border: none;
      color: white;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-yes {
      left: 50%;
      transform: translateX(-110%);
      background: #22c55e;
    }

    .btn-yes:hover {
      background: #16a34a;
    }

    .btn-no {
      background: #ef4444;
    }

    .btn-no:hover {
      background: #dc2626;
    }

    @media (min-width: 768px) {
      .card {
        flex-direction: row;
        gap: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <img
      src="https://id-preview--2494f03c-daa0-49cb-8e91-45af13faf720.lovable.app/__l5e/assets-v1/862cd7fa-c892-41d7-a2ce-7dcbbf6b17a1/homer.png"
      alt="Homer"
    />
    <div class="content">
      <h1> Ahoj Soňa </h1>
      <p> Čo keby sme vyšli na Kapušianský 🏰?</p>
      <div class="btn-area">
        <button class="btn-yes" onclick="alert('Vedel som že neodmietneš 😏')">Áno</button>
        <button class="btn-yes" onclick="alert('Tak zapíš si do harmonogramu 16.6. 16.30 😜')">Áno</button>
        <button class="btn-no" id="btnNo">Nie</button>
      </div>
    </div>
  </div>

  <script>
    const btnNo = document.getElementById('btnNo');

    function dodgeNo() {
      const top = Math.random() * 80;
      const left = Math.random() * 80;
      btnNo.style.top = top + '%';
      btnNo.style.left = left + '%';
    }

    btnNo.addEventListener('mouseenter', dodgeNo);
    btnNo.addEventListener('click', dodgeNo);
  </script>
</body>
</html>
